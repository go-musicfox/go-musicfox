<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贡献者 — go-musicfox</title>
  <meta name="description" content="go-musicfox 的所有贡献者——感谢每一行代码和每一次参与。">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    @font-face{font-family:'JetBrains Mono';font-style:italic;font-weight:400;font-display:swap;src:url('fonts/jetbrains-mono-400-italic.ttf') format('truetype')}
    @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/jetbrains-mono-400.ttf') format('truetype')}
    @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:500;font-display:swap;src:url('fonts/jetbrains-mono-500.ttf') format('truetype')}
    @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:600;font-display:swap;src:url('fonts/jetbrains-mono-600.ttf') format('truetype')}
    @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:700;font-display:swap;src:url('fonts/jetbrains-mono-700.ttf') format('truetype')}
    @font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:800;font-display:swap;src:url('fonts/jetbrains-mono-800.ttf') format('truetype')}
  </style>
  <style>
    :root {
      --bg-deepest: #0B0808;
      --bg-default: #100D0C;
      --bg-surface: #171212;
      --bg-elevated: #1E1717;
      --bg-hover: #251C1C;
      --text-primary: #EBE4E4;
      --text-secondary: #A89898;
      --text-tertiary: #6B5C5C;
      --accent: #EA403F;
      --accent-dim: #2A1212;
      --accent-glow: rgba(234, 64, 63, 0.18);
      --border-subtle: #1E1616;
      --border-default: #302020;
      --font-mono: 'JetBrains Mono','Cascadia Code','Fira Code','SF Mono',monospace;
      --font-body: -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
      --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;
      --ease-out: cubic-bezier(0.23,1,0.32,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased}
    body{background:var(--bg-deepest);color:var(--text-primary);font-family:var(--font-body);line-height:1.7;padding:0;min-height:100vh}
    .nav{position:fixed;top:0;left:0;right:0;z-index:100;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);background:rgba(11,8,8,.82);border-bottom:1px solid var(--border-subtle)}
    .nav-inner{display:flex;align-items:center;max-width:820px;margin:0 auto;padding:0 24px;height:56px}
    .nav-logo{display:flex;align-items:center;gap:0;font-family:var(--font-mono);font-weight:700;font-size:1rem;color:var(--text-primary);text-decoration:none}
    .nav-logo img{width:24px;height:24px;border-radius:4px;margin-right:8px}
    .nav-prompt{color:var(--accent);font-weight:400}
    .container{max-width:820px;margin:0 auto;padding:80px 24px 48px;text-align:center}
    h1{font-family:var(--font-mono);font-size:1.5rem;font-weight:600;margin-bottom:8px;letter-spacing:-.02em}
    .subtitle{font-size:.9375rem;color:var(--text-tertiary);margin-bottom:40px}
    .back{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:.8125rem;color:var(--text-tertiary);margin-bottom:24px}
    .back:hover{color:var(--accent)}
    .contrib-image{display:inline-block;border-radius:var(--radius-lg);overflow:hidden;transition:opacity 200ms var(--ease-out)}
    .contrib-image:hover{opacity:.7}
    .contrib-image img{display:block;max-width:100%;height:auto}
    .view-link{display:inline-block;margin-top:32px;font-family:var(--font-mono);font-size:.8125rem;color:var(--text-tertiary);padding:8px 20px;transition:color 150ms var(--ease-out)}
    .view-link:hover{color:var(--accent);border-color:var(--accent)}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <img src="logo.png" alt="go-musicfox" width="24" height="24">
        <span class="nav-prompt">$&nbsp;</span>musicfox
      </a>
    </div>
  </nav>

  <div class="container">
    <div style="text-align:left"><a href="/" class="back">← 返回首页</a></div>
    <h1>贡献者</h1>
    <p class="subtitle">感谢每一位让 go-musicfox 变得更好的人。</p>

    <a href="https://github.com/go-musicfox/go-musicfox/graphs/contributors" target="_blank" rel="noopener" class="contrib-image">
      <img src="https://contrib.rocks/image?repo=go-musicfox/go-musicfox&max=100" alt="go-musicfox contributors">
    </a>

    <br>
    <a href="https://github.com/go-musicfox/go-musicfox/graphs/contributors" target="_blank" rel="noopener" class="view-link">在 GitHub 上查看全部 →</a>
  </div>
</body>
</html>

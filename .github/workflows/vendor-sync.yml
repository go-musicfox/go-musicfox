name: Sync Go Vendor

on:
  push:
    branches:
      - master
    paths:
      - "go.mod"
      - "go.sum"
      - ".github/workflows/vendor-sync.yml"

jobs:
  vendor-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "^1.22.0"

      - name: Run go mod vendor (with C/C++ file sync)
        run: make vendor

      - name: Stage files and check for changes
        id: check_changes
        run: |
          git add go.mod go.sum vendor/

          if ! git diff --cached --quiet; then
            echo "Changes detected in vendor directory or go modules."
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No changes detected."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request for Vendor Updates
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(vendor): sync go vendor directory"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          title: "chore(vendor): 同步 go vendor 目录"
          body: |
            自动工作流检测到 `go.mod` 或 `go.sum` 发生了变更，已同步更新 vendor 目录。

            此 PR 自动生成，请审查并合并。

          branch: "bot/vendor-sync"

          labels: |
            dependencies

# Deploy official website to Cloudflare Pages
#
# Required secrets (set in GitHub repo → Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — API token with Cloudflare Pages:Write permission
#   CLOUDFLARE_ACCOUNT_ID  — Your Cloudflare account ID (find in Cloudflare Dashboard → right side)
#
# Cloudflare Pages project "musicfox" will be auto-created on first deploy.
# After first deploy, set custom domain musicfox.anhoder.com in Cloudflare Dashboard.

name: Deploy Website

on:
  push:
    branches:
      - master
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Create Pages project (if not exists)
        run: wrangler pages project create musicfox --production-branch master || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy website/ --project-name=musicfox --branch=master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

name: pr-standards

on:
  pull_request_target:
    types: [opened, edited, synchronize]

jobs:
  check-standards:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check PR standards
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const login = pr.user.login;

            // Skip bots
            if (login.endsWith('[bot]')) {
              console.log(`Skipping bot: ${login}`);
              return;
            }

            const title = pr.title;

            async function addLabel(label) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [label]
              });
            }

            async function removeLabel(label) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: label
                });
              } catch (e) {
                // Label wasn't present, ignore
              }
            }

            async function comment(marker, body) {
              const markerText = `<!-- pr-standards:${marker} -->`;
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });
              
              const existing = comments.find(c => c.body.includes(markerText));
              if (existing) return;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: markerText + '\n' + body
              });
            }

            // Step 1: Check title format
            // Matches: feat:, feat(scope):, feat (scope):, etc.
            const titlePattern = /^(feat|fix|docs|chore|refactor|test|style|perf|build|ci)\s*(\([a-zA-Z0-9-]+\))?\s*:/;
            const hasValidTitle = titlePattern.test(title);

            if (!hasValidTitle) {
              await addLabel('needs:title');
              await comment('title', `你的 PR 标题 \`${title}\` 不符合 Conventional Commit 规范。

            请修改标题，以以下格式之一开头：
            - \`feat:\` 或 \`feat(scope):\` 新功能
            - \`fix:\` 或 \`fix(scope):\` Bug 修复
            - \`docs:\` 或 \`docs(scope):\` 文档更新
            - \`chore:\` 或 \`chore(scope):\` 维护任务
            - \`refactor:\` 或 \`refactor(scope):\` 代码重构
            - \`test:\` 或 \`test(scope):\` 测试相关
            - \`style:\` 或 \`style(scope):\` 代码格式调整
            - \`perf:\` 或 \`perf(scope):\` 性能优化
            - \`build:\` 或 \`build(scope):\` 构建系统
            - \`ci:\` 或 \`ci(scope):\` CI/CD 变更

            其中 \`scope\` 为包名或模块名（例如 \`player\`、\`ui\`、\`config\`）。

            详见 [CONTRIBUTING.md](../blob/master/CONTRIBUTING.md)。`);
              return;
            }

            await removeLabel('needs:title');

            // Step 2: Only bug fix PRs require a linked issue
            const isFixPR = /^fix\s*(\([a-zA-Z0-9-]+\))?\s*:/.test(title);
            if (!isFixPR) {
              await removeLabel('needs:issue');
              console.log('Skipping issue check for non-fix PR');
              return;
            }
            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 1) {
                      totalCount
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: pr.number
            });

            const linkedIssues = result.repository.pullRequest.closingIssuesReferences.totalCount;

            if (linkedIssues === 0) {
              await addLabel('needs:issue');
              await comment('issue', `感谢你的贡献！

            此 PR 未关联 Issue。Bug 修复类 PR 必须关联一个已有的 Issue。

            请按以下步骤操作：
            1. 打开一个 Issue 描述该 Bug（如尚不存在）
            2. 在 PR 描述中添加 \`Fixes #<编号>\` 或 \`Closes #<编号>\`

            详见 [CONTRIBUTING.md](../blob/master/CONTRIBUTING.md)。`);
              return;
            }

            await removeLabel('needs:issue');
            console.log('PR meets all standards');

  check-compliance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check PR template compliance
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const login = pr.user.login;

            // Skip bots
            if (login.endsWith('[bot]')) {
              console.log(`Skipping bot: ${login}`);
              return;
            }

            const body = pr.body || '';
            const title = pr.title;
            const isFixPR = /^fix\s*(\([a-zA-Z0-9-]+\))?\s*:/.test(title);

            const issues = [];

            // Check: template sections exist (Issue section only required for bug fix PRs)
            const hasWhatSection = /### What does this PR do\?/.test(body);
            const hasTypeSection = /### Type of change/.test(body);
            const hasVerifySection = /### How did you verify your code works\?/.test(body);
            const hasChecklistSection = /### Checklist/.test(body);
            const hasIssueSection = /### Issue for this PR/.test(body);

            if (!hasWhatSection || !hasTypeSection || !hasVerifySection || !hasChecklistSection) {
              issues.push('PR 描述缺少必需的模板段落，请使用 [PR 模板](../blob/master/.github/pull_request_template.md)。');
            }

            if (isFixPR && !hasIssueSection) {
              issues.push('Bug 修复类 PR 必须包含「Issue for this PR」段落并关联 Issue。');
            }

            // Check: "What does this PR do?" has real content (not just placeholder text)
            if (hasWhatSection) {
              const whatMatch = body.match(/### What does this PR do\?\s*\n([\s\S]*?)(?=###|$)/);
              const whatContent = whatMatch ? whatMatch[1].trim() : '';
              const placeholder = 'Please provide a description of the issue';
              const onlyPlaceholder = whatContent.includes(placeholder) && whatContent.replace(placeholder, '').replace(/[*\s]/g, '').length < 20;
              if (!whatContent || onlyPlaceholder) {
                issues.push('「What does this PR do?」段落为空或仅含占位文本，请描述你的更改。');
              }
            }

            // Check: at least one "Type of change" checkbox is checked
            if (hasTypeSection) {
              const typeMatch = body.match(/### Type of change\s*\n([\s\S]*?)(?=###|$)/);
              const typeContent = typeMatch ? typeMatch[1] : '';
              const hasCheckedBox = /- \[x\]/i.test(typeContent);
              if (!hasCheckedBox) {
                issues.push('未勾选任何「Type of change」复选框，请至少选择一项。');
              }
            }

            // Check: issue reference (only required for bug fix PRs)
            if (isFixPR && hasIssueSection) {
              const issueMatch = body.match(/### Issue for this PR\s*\n([\s\S]*?)(?=###|$)/);
              const issueContent = issueMatch ? issueMatch[1].trim() : '';
              const hasIssueRef = /(closes|fixes|resolves)\s+#\d+/i.test(issueContent) || /#\d+/.test(issueContent);
              if (!hasIssueRef) {
                issues.push('Bug 修复类 PR 必须引用 Issue。请添加 `Closes #<编号>` 关联相关 Issue。');
              }
            }

            // Check: "How did you verify" has content
            if (hasVerifySection) {
              const verifyMatch = body.match(/### How did you verify your code works\?\s*\n([\s\S]*?)(?=###|$)/);
              const verifyContent = verifyMatch ? verifyMatch[1].trim() : '';
              if (!verifyContent) {
                issues.push('「How did you verify your code works?」段落为空，请说明你是如何测试的。');
              }
            }

            // Check: checklist boxes are checked
            if (hasChecklistSection) {
              const checklistMatch = body.match(/### Checklist\s*\n([\s\S]*?)(?=###|$)/);
              const checklistContent = checklistMatch ? checklistMatch[1] : '';
              const unchecked = (checklistContent.match(/- \[ \]/g) || []).length;
              const checked = (checklistContent.match(/- \[x\]/gi) || []).length;
              if (checked < 2) {
                issues.push('未勾选全部 Checklist 项，请确认你已在本地测试且未包含无关更改。');
              }
            }

            // Helper functions
            async function addLabel(label) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [label]
              });
            }

            async function removeLabel(label) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: label
                });
              } catch (e) {}
            }

            const hasComplianceLabel = pr.labels.some(l => l.name === 'needs:compliance');

            if (issues.length > 0) {
              // Non-compliant
              if (!hasComplianceLabel) {
                await addLabel('needs:compliance');
              }

              const marker = '<!-- issue-compliance -->';
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });
              const existing = comments.find(c => c.body.includes(marker));

              const body_text = `${marker}
            此 PR 不完全符合我们的[贡献指南](../blob/master/CONTRIBUTING.md)和 [PR 模板](../blob/master/.github/pull_request_template.md)。

            **需要修复的问题：**
            ${issues.map(i => `- ${i}`).join('\n')}

            请在 **2 小时**内修改 PR 描述以解决以上问题，否则该 PR 将被自动关闭。

            如果你认为此标记有误，请联系维护者。`;

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: body_text
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: body_text
                });
              }

              console.log(`PR #${pr.number} is non-compliant: ${issues.join(', ')}`);
            } else if (hasComplianceLabel) {
              // Was non-compliant, now fixed
              await removeLabel('needs:compliance');

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });
              const marker = '<!-- issue-compliance -->';
              const existing = comments.find(c => c.body.includes(marker));
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id
                });
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '感谢你更新了 PR！现在它符合我们的贡献指南了。:+1:'
              });

              console.log(`PR #${pr.number} is now compliant, label removed`);
            } else {
              console.log(`PR #${pr.number} is compliant`);
            }
